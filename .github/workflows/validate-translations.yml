name: Validate Translations

on:
  pull_request:
    paths:
      - "**/translations.csv"
      - "**/strings.csv"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-translations:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python3 -m pip install -e .

      - name: Validate changed translation CSVs
        id: validate
        continue-on-error: true
        run: |
          python3 scripts/validate_translations_pr.py \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            "$RUNNER_TEMP/translation-validation.md"

      - name: Post PR comment
        uses: actions/github-script@v7
        env:
          COMMENT_PATH: ${{ runner.temp }}/translation-validation.md
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.COMMENT_PATH, 'utf8');
            const marker = '<!-- gsc-translation-validation -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Fail if validation found budget issues
        if: steps.validate.outcome == 'failure'
        run: exit 1
