name: Generate Status JSON

on:
  push:
    paths:
      - "**/translations.csv"
      - "**/strings.csv"
      - "**/strings.py"

permissions:
  contents: write

jobs:
  generate-status:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate status.json
        run: python3 scripts/generate_status.py

      - name: Check for status changes
        id: status_changes
        run: |
          if git diff --quiet -- web/static/status.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated status.json
        if: steps.status_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/static/status.json
          git commit -m "chore(web): regenerate status.json"
          git push
